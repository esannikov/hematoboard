<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'"
    />
    <meta
      name="description"
      content="HematoBoard AI: evidence-based, agent-assisted case review."
    />
    <title>HematoBoard AI</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231a2738'/%3E%3Cpath d='M19 44V20h6l7 12 7-12h6v24h-6V30l-7 11-7-11v14z' fill='%23f3f7fa'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="methodology.css" />
    <link rel="stylesheet" href="readability.css?v=20260713" />
  </head>
  <body class="min-h-screen bg-canvas p-0 font-sans text-ink antialiased">
    <a class="skip-link" href="#content">До змісту</a>

    <header class="app-header mx-auto flex w-full max-w-[1440px] flex-col justify-start gap-5 px-5 py-4 sm:flex-row sm:items-center sm:gap-8 sm:px-8 lg:px-12">
      <a class="brand-block focus-ring flex items-center gap-3 rounded-md" href="./" aria-label="HematoBoard AI">
        <img class="brand-logo" src="./hematoboard_logo.png" alt="" width="524" height="524" />
        <span class="grid gap-1"><strong class="block text-base font-semibold tracking-[-0.015em]">HematoBoard AI</strong><span class="block max-w-[31ch] text-xs leading-5 text-muted">Evidence-based, agent-assisted case review</span></span>
      </a>

      <div class="header-case-tools w-full sm:w-[390px] sm:shrink-0">
        <label class="case-picker" for="case-select">
          <span class="sr-only">Кейс для аналізу</span>
          <select class="focus-ring min-h-10 w-full rounded-lg border border-rule-strong bg-panel px-3.5 text-sm font-medium" id="case-select" aria-describedby="bundle-status"></select>
        </label>
        <div class="status-line" id="bundle-status" role="status" aria-live="polite">Завантаження пакета…</div>
      </div>
    </header>

    <nav class="route-nav mx-auto flex w-full max-w-[1440px] items-center gap-3 border-y border-rule px-5 py-2 sm:px-8 lg:px-12" aria-label="Розділи кейсу">
      <div class="route-buttons primary-routes" id="primary-nav"></div>
      <button class="route-button packet-nav-action focus-ring" id="packet-nav-action" type="button" data-view="packet">Бриф / PDF</button>
    </nav>

    <main class="mx-auto min-h-[55vh] w-full max-w-[1440px] px-5 py-8 sm:px-8 lg:px-12 lg:py-10" id="content" tabindex="-1"></main>

    <footer class="app-footer mx-auto grid w-full max-w-[1440px] gap-2 border-t border-rule px-5 py-5 text-[11px] text-faint sm:px-8 lg:grid-cols-[1fr_auto] lg:px-12">
      <p>
        Локальний методологічний інструмент. Попередні сліди настанов не є клінічним
        висновком; рішення належить лікарю з повним первинним контекстом.
      </p>
      <p id="footer-contract"></p>
    </footer>

    <script type="module" src="methodology.js?v=20260714-evidence-contract"></script>
  </body>
</html>
